services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: hotel_db
      POSTGRES_USER: hotel_user
      POSTGRES_PASSWORD: hotel_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web:
    build: .
    command: >
      sh -c "until python -c \"import socket; s=socket.socket(); s.connect(('db',5432)); s.close()\" 2>/dev/null; do echo 'Waiting for db...'; sleep 1; done &&
             python manage.py migrate &&
             gunicorn hotel.wsgi:application --bind 0.0.0.0:8000 --workers 2"
    volumes:
      - ./backend:/app/backend
      - ./frontend:/app/frontend
    ports:
      - "8000:8000"
    environment:
      DB_NAME: hotel_db
      DB_USER: hotel_user
      DB_PASSWORD: hotel_password
      DB_HOST: db
      DB_PORT: 5432
      EMAIL_HOST_USER: johannshonigeorge@gmail.com
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
    depends_on:
      - db

  adminer:
    image: adminer
    ports:
      - "8081:8080"
    depends_on:
      - db

volumes:
  postgres_data:
