services:
  - type: web
    name: hotel-management
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: hotel-management.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: hotel-db
          property: connectionString
      - key: EMAIL_HOST_USER
        value: johannshonigeorge@gmail.com
      - key: EMAIL_HOST_PASSWORD
        sync: false

databases:
  - name: hotel-db
    plan: free
